<!DOCTYPE html>
<html>
  <head>
    <title>Redirecting to K-PESA...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; background: #111; color: #fff; }
      .spinner { width: 40px; height: 40px; border: 4px solid rgba(55,194,21,.2); border-top-color: #37c215; border-radius: 50%; animation: spin .8s linear infinite; margin: 30px auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .btn { display: inline-block; padding: 14px 28px; background: #37c215; color: #fff; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 24px; font-size: 16px; }
      .status { color: #aaa; margin-top: 16px; font-size: 14px; }
      .error { color: #f44; margin-top: 16px; font-size: 14px; display: none; }
    </style>
  </head>
  <body>
    <h2 style="margin-bottom:8px">Returning to K-PESA</h2>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Verifying your Deriv account...</p>
    <p class="error" id="error"></p>
    <a id="manual-btn" href="#" class="btn" style="display:none">Open K-PESA</a>

    <script>
      // ── Parse Deriv OAuth redirect parameters ───────────────────────────────
      // Deriv legacy flow returns: ?token1=xxx&acct1=CRyyy&token2=zzz&acct2=VRTCwww
      // Deriv code flow returns:   ?code=xxx&state=yyy
      var qs = window.location.search;
      var hash = window.location.hash;
      var params = new URLSearchParams(qs || (hash ? hash.substring(1) : ''));

      var token1  = params.get('token1');
      var acct1   = params.get('acct1');
      var code    = params.get('code');
      var state   = params.get('state');

      // Pick the best token (legacy token1 preferred, fall back to code)
      var derivToken   = token1 || code || '';
      var derivAccount = acct1 || '';

      // The backend URL — must match the running K-PESA backend
      // In production change this to https://api.k-pesa.tech
      var BACKEND = 'https://api.k-pesa.tech/api/v1';
      // Fallback to local dev
      // var BACKEND = 'http://192.168.217.248:3000/api/v1';

      // Build the deep link (still try as a bonus)
      var allParams = qs || '';
      if (!allParams && hash) allParams = '?' + hash.substring(1);
      var deepLink = 'kpesa://deriv-callback' + allParams;
      document.getElementById('manual-btn').href = deepLink;

      // ── POST tokens to the K-PESA backend ─────────────────────────────────
      if (derivToken && state) {
        fetch(BACKEND + '/deriv/oauth-callback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            state:   state,
            token:   derivToken,
            account: derivAccount,
          }),
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('spinner').style.display = 'none';
          if (data.ok) {
            document.getElementById('status').textContent =
              'Account verified! Open the K-PESA app to continue.';
          } else {
            document.getElementById('status').textContent =
              'Verified. Open the K-PESA app to continue.';
          }
          document.getElementById('manual-btn').style.display = 'inline-block';
          // Try the deep link automatically
          setTimeout(function() { window.location.href = deepLink; }, 600);
        })
        .catch(function() {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent =
            'Could not reach server. Open the K-PESA app and try again.';
          document.getElementById('manual-btn').style.display = 'inline-block';
          setTimeout(function() { window.location.href = deepLink; }, 600);
        });
      } else {
        // No tokens found — just try deep link
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Redirecting...';
        document.getElementById('manual-btn').style.display = 'inline-block';
        setTimeout(function() { window.location.href = deepLink; }, 300);
      }
    </script>
  </body>
</html>
