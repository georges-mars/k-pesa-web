<!DOCTYPE html>
<html>
  <head>
    <title>Redirecting to K-PESA...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { font-family: sans-serif; text-align: center; padding-top: 50px; }
      .btn { display: inline-block; padding: 12px 24px; background-color: #37c215; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
    </style>
    <script>
      window.onload = function() {
        // Deriv may use query params (?code=...) or hash fragment (#token1=...)
        var params = window.location.search || '';
        if (!params && window.location.hash) {
          params = '?' + window.location.hash.substring(1);
        }
        var deepLink = 'kpesa://deriv-callback' + params;
        document.getElementById('manual-btn').href = deepLink;
        // Auto-redirect after a short delay
        setTimeout(function() {
          window.location.href = deepLink;
        }, 300);
      };
    </script>
  </head>
  <body>
    <h3>Returning to K-PESA app...</h3>
    <p>If you are not redirected automatically, tap the button below.</p>
    <a id="manual-btn" href="#" class="btn">Open K-PESA</a>
  </body>
</html>
